<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion — COFINANCE CI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0e0e1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: #13131f;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            border: 1px solid #2d1b6e44;
            box-shadow: 0 0 60px #7c3aed22;
        }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo h1 { color: #c084fc; font-size: 24px; font-weight: 700; }
        .logo p { color: #6b7280; font-size: 13px; margin-top: 6px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; color: #a78bfa; font-size: 12px; margin-bottom: 6px; letter-spacing: 0.5px; }
        .form-group input { width: 100%; padding: 12px 14px; background: #1a1a2e; border: 1px solid #2d1b6e; border-radius: 10px; color: #e9d5ff; font-size: 14px; }
        .form-group input:focus { outline: none; border-color: #7c3aed; box-shadow: 0 0 0 3px #7c3aed22; }
        .btn-login { width: 100%; padding: 13px; background: linear-gradient(135deg, #7c3aed, #c084fc); color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600; margin-top: 8px; transition: opacity 0.2s; }
        .btn-login:hover { opacity: 0.85; }
        .alert-error { background: #7f1d1d33; color: #fca5a5; border: 1px solid #fca5a533; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
        .link { text-align: center; margin-top: 20px; font-size: 13px; color: #6b7280; }
        .link a { color: #c084fc; text-decoration: none; }
    </style>
</head>
<body>
<div class="login-box">
    <div class="logo">
        <h1>💜 COFINANCE CI</h1>
        <p>Connectez-vous à votre espace</p>
    </div>

    {% if error %}
    <div class="alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login/">
        {% csrf_token %}
        <div class="form-group">
            <label>Nom d'utilisateur</label>
            <input type="text" name="username" placeholder="Ex: admin" required/>
        </div>
        <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" name="password" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn-login">Se connecter</button>
    </form>

    <div class="link">
        Pas encore de compte ? <a href="/register/">S'inscrire</a>
    </div>
</div>
</body>
</html>
